<!DOCTYPE html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Grizz's Profile</title>
    <meta charset="utf-8">
    <link rel="icon" type="image/x-icon" href="/Media/Grizz.ico">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --border-radius-5: 5px;
            --text-color-default: rgb(245, 222, 180);
            --text-color-other: rgb(170, 155, 130);
        }

        body {
            background-color: #6F4E37;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
        }

        .center {
            background-color: #383838;
            box-shadow: 10px 10px #000000;
            position: absolute;
            margin: auto;
            width: 60%;
            height: 550px;
            border-radius: var(--border-radius-5);
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        #infoSection {
            background-color: rgb(70, 70, 70);
            border-top-right-radius: var(--border-radius-5);
            display: flex;
        }

        #profileImage {
            width: 200px;
            border-top-left-radius: var(--border-radius-5);
        }

        .nameAndbio {
            margin-left: 20px;
            display: flex;

            flex-direction: column;
            flex-wrap: nowrap;
            align-items: flex-start;
            align-content: flex-start;
            justify-content: flex-start;
            padding-top: 20px;
        }

        #name {
            font-size: 30px;
            font-weight: bolder;
            color: var(--text-color-default);
            margin: 0;
        }

        #desc {
            margin: 0;
            color: var(--text-color-other)
        }

        .rightCards {
            margin-left: auto;
        }

        #skillIcons {
            margin-top: 20px;
            background-color: #ECB176;
            height: fit-content;
            border-top-left-radius: var(--border-radius-5);
            border-bottom-left-radius: var(--border-radius-5);
            right: 0;
            margin-left: auto;
        }

        #skillIcons>ul {
            list-style-type: none;
            display: flex;
            padding: 0;
            padding-left: 20px;
            margin-top: 0;
            margin-right: 15px;
        }

        #skillIcons>ul>li {
            margin-left: 5px;
            margin-bottom: 10px;
        }

        #skillIcons>a {
            font-size: 13px;
            display: block;
            width: max-content;
            rotate: 90deg;
            margin: 0;
            transform: translate(20px, 13px);
            color: white;
        }

        #socialIcons>ul {
            list-style-type: none;
            display: flex;
            padding: 0;
            padding-left: 20px;
            margin-top: 0;
            margin-right: 15px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        #socialIcons>a {
            font-size: 13px;
            display: block;
            width: max-content;
            rotate: 90deg;
            margin: 0;
            transform: translate(18px, 10px);
            color: white;
        }

        #socialIcons {
            margin-top: 20px;
            background-color: #ECB176;
            height: fit-content;
            border-top-left-radius: var(--border-radius-5);
            border-bottom-left-radius: var(--border-radius-5);
            right: 0;
            margin-left: auto;
        }

        #socialIcons>ul>li {
            margin-left: 5px;
            margin-bottom: 10px;
        }

        #headerLabel {
            color: var(--text-color-default);
            text-align: left;
            margin-left: 20px;
            margin-right: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--text-color-other);
        }

        button {
            border: none;
            cursor: pointer;
            background-color: transparent;
            height: fit-content;
            width: 100%;
            padding: 5px;
        }

        #project_container>ul {
            padding: 0;
            margin: 0;
        }

        #projects_container>ul>li {
            margin: 20px;
            padding: 0;
            list-style-type: none;

        }

        #projects_container>ul>li>input:hover {
            opacity: .5;
        }

        #projects_container>ul>li>input {
            margin: 0;
            padding: 15px;
            color: white;
            font-family: "Source Code Pro", monospace;
            font-size: 20px;
            border: 0;
            background-color: rgb(25, 67, 235);
            transition: opacity 0.35s;
            opacity: 1;
            cursor: pointer;
        }
    </style>

    <script>
        function openSocial(e) {
            if (e == 'instagram') {
                window.open("https://www.instagram.com/nbit.lnk/");
            } else if (e == 'github') {
                window.open("https://github.com/Grizzey")
            } else if (e == 'discord') {
                window.open("https://discord.com/users/489963091019169802")
            }
        }

        function openProjectCard(a) {
            try {
                if (a == 'windowsProject') {
                    window.open("https://jabaitech.github.io/comprog1-java-windows");
                } else if (a == 'BLANK') {
                    //BLANK
                    alert('Coming Soon...');
                }
            } catch(err) {
                console.error("Error at:" + err);
            }

        }
    </script>

</head>

<body>
    <div class="center">
        <div class="header">
            <div id="infoSection">
                <img id="profileImage" src="./Media/babysnoopy.jpeg">
                <div class="nameAndbio">
                    <p id="name">nBit</p>
                    <p id="desc">Still learning stuff</p>
                </div>

                <div class="rightCards">

                    <div id="skillIcons">
                        <a>Skill set</a>
                        <ul>
                            <li><img height="32" width="32" src="https://cdn.simpleicons.org/html5/white" />
                            </li>
                            <li><img height="32" width="32" src="https://cdn.simpleicons.org/css3/white" /></li>
                            <li><img height="32" width="32" src="https://cdn.simpleicons.org/javascript/white" /></li>
                            <li><img height="32" width="32" src="https://cdn.simpleicons.org/lua/white" /></li>
                            <li><img height="32" width="32" src="https://cdn.simpleicons.org/openjdk/white" /></li>
                        </ul>
                    </div>

                    <div id="socialIcons">
                        <a>Socials</a>
                        <ul>
                            <li><button type="button"><img height="32" width="32"
                                        src="https://cdn.simpleicons.org/instagram/white"
                                        onclick="openSocial('instagram')" /></button></li>
                            <li><button type="button"><img height="32" width="32"
                                        src="https://cdn.simpleicons.org/github/white"
                                        onclick="openSocial('github')" /></button></li>
                            <li><button type="button"><img height="32" width="32"
                                        src="https://cdn.simpleicons.org/discord/white"
                                        onclick="openSocial('discord')" /></button></li>
                        </ul>
                    </div>

                </div>

            </div>
            <h1 id="headerLabel">Recent Projects</h1>

            <div id="projects_container">
                <ul>
                    <li id="project1"><input type="button" onclick="openProjectCard('windowsProject')"
                            value="Windows Style Website"></li>
                    <li id="project2"><input type="button" onclick="openProjectCard('BLANK')" value="Not done yet"></li>
                </ul>
            </div>
        </div>
    </div>
</body>
