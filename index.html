<!DOCTYPE html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grizz's Profile</title>
    <meta charset="utf-8">
    <link rel="icon" type="image/x-icon" href="/Media/Grizz.ico">

    <!--Icons-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Exo+2&display=swap');
            @import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300&display=swap');

            body::-webkit-scrollbar {
                width: 5px;
            }

            body::-webkit-scrollbar-thumb {
                background-color: rgb(131, 131, 131);
            }

            html,
            body {
                position: inherit;
                background-color: rgb(22, 21, 18);
                top: 0;
                bottom: 0;
                left: 0;
                right: 0;

                user-select: none;
                -webkit-user-select: none;
                -khtml-user-select: none;
                -moz-user-select: none;
                -ms-user-select: none;
            }

            #main {
                background-color: rgb(70, 70, 70);
                top: 0; bottom: 0; right: 0; left: 0;
                height: 150vh;
                width: 175vh;
                margin: auto;
            }

            #box-content {
                background-color: rgb(82, 82, 82);
                width: 350px;
                float: left;
                margin: auto;
                text-align: center;
            }
         
            #pic{
                border-radius: 100%;
                height: 250px;
                margin: inherit;
                margin-top: 5px;
                min-height: 125px;
                max-height: 250px;
                border: #222222 6px solid;
            }

            #nickname {
                color: #ffffff;
                font-family: 'Josefin Sans', sans-serif;
                font-size: 25px;
            }

            #fullname {
                color: #ffff;
                font-family: 'Josefin Sans';
                color: #ffff;
                font-size: 35px;
            }

            #material-symbols-outlined {
                color: white;
            }

            #aboutme {
                color: #ffff;
                font-family: 'Josefin Sans';
                font-size: 30px;
                padding-left: 1em;
                float: left;
            }

            #intro-holder {
                margin-top: 10em;
            }

            #intro {
                color: #ffff;
                font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            }
        </style>
</head>

<body>
    <div id="main">
            <div id="box-content">
                <img id="pic" src="/Media/igop.jpg"></img>
                <div>
                    <a id="fullname">Terence Montecillo</a>
                    <br></br>
                    <a id="nickname">itlog</a>
                </div>
                <span class="material-symbols-outlined">location_on</span>
                <div id="intro-holder">
                    <p id="intro">Description here</p>
                </div>
            </div>

            <div class="main-content">
                
            </div>
    </div>
</body>
